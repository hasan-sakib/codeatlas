name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: codeatlas
          POSTGRES_PASSWORD: codeatlas
          POSTGRES_DB: codeatlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U codeatlas"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE__URL: postgresql+asyncpg://codeatlas:codeatlas@localhost:5432/codeatlas
      QDRANT__URL: http://localhost:6333
      REDIS__URL: redis://localhost:6379/0
      OLLAMA__BASE_URL: http://localhost:11434
      SECURITY__JWT_SECRET_KEY: ci-only-secret-not-for-production
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

      - name: Type-check
        run: uv run mypy app

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Check for model/migration drift
        run: uv run alembic check

      - name: Run unit tests
        run: uv run pytest tests -m "not integration" --cov=app --cov-report=term-missing

      - name: Run integration tests
        run: uv run pytest tests -m integration
