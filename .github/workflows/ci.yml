name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pre-commit hooks
        uses: pre-commit/action@v3.0.1

      - name: Type-check
        run: uv run mypy app

      - name: Run unit tests
        run: uv run pytest tests -m "not integration" --cov=app --cov-report=term-missing
