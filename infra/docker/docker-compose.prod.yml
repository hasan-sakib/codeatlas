# Production-like overlay: no bind mounts (immutable images built from
# the same Dockerfiles — swap `build:` for a pinned `image:` once CI
# publishes tagged images, see docs/modules/deployment.md), resource
# limits, restart policies, log rotation, and no host ports on anything
# except `frontend`/`backend-api` (per DESIGN.md §22 — everything else is
# reachable only via `backend_net`, which this overlay marks internal).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  backend_net:
    internal: true

services:
  # 4g, not the more typical 2g: BGE-M3 alone is ~2.2GB resident in fp32
  # (forced off fp16 on CPU — see bge_m3_adapter.py) plus the reranker
  # model plus Python/torch/uvicorn overhead. Verified directly: 2g
  # OOM-killed backend-api (silently — Compose reports the container as
  # merely "restarting", not obviously "out of memory") on the very
  # first real embedding call in this exact topology.
  backend-api:
    restart: unless-stopped
    ports:
      - "8000:8000"
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g

  worker:
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g

  frontend:
    restart: unless-stopped
    ports:
      - "3000:3000"
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m

  postgres:
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g

  redis:
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m

  qdrant:
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g

  ollama:
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
