# Local development overlay: bind-mounts for hot reload, host-published
# ports on every service (including internal ones, for direct psql/
# redis-cli/curl debugging), and `--reload`/`next dev` in place of the
# production commands. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  backend-api:
    volumes:
      - ../../backend/app:/app/app
    ports:
      - "8000:8000"
    command:
      [
        "uvicorn",
        "app.main:create_app",
        "--factory",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
        "--reload-dir",
        "/app/app",
      ]

  worker:
    volumes:
      - ../../backend/app:/app/app

  frontend:
    build:
      target: deps
    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next_cache:/app/.next
    ports:
      - "3000:3000"
    command: ["npm", "run", "dev"]
    # The deps stage has no HEALTHCHECK baked in (Next's dev server is
    # slower to boot than the production standalone server) — give it
    # more retries at a longer interval rather than tightening the base
    # healthcheck for both dev and prod.
    healthcheck:
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  ollama:
    ports:
      - "11434:11434"

volumes:
  frontend_node_modules:
  frontend_next_cache:
